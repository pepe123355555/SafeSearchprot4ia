<!DOCTYPE html>
<html lang="pt-BR">

<head>
   
  <meta charset="UTF-8">
   
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Search</title>
   
  <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container-principal" id="meuContainer">

        <h1 class="logo">🔎 Safe Search</h1>
        <p class="sub">Navegue com segurança. Pesquise a verdade</p>

        <div class="busca">
            <svg class="search-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path          
          d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z">
                  </path>
              </svg>

            <input type="text" id="pesquisa" placeholder="Digite sua pesquisa ou comando..."        
        onkeypress="verificarEnter(event)">

            <!-- NOVO: Ícone de X para fechar a pesquisa -->
            <svg class="close-icon" onclick="fecharPesquisa()" focusable="false" xmlns="http://www.w3.org/2000/svg"    
            viewBox="0 0 24 24">
                <path
          d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z">
                  </path>
              </svg>

            <button onclick="dispararBusca()">Buscar</button>
          </div>

        <div id="resultado"></div>

      </div>

   
  <script src="app.js"></script>

   
  <script>
    function dispararBusca() {
      const input = document.getElementById("pesquisa");
      const container = document.getElementById("meuContainer");

      if (input.value.trim() !== "") {
        buscar();
        container.classList.add("active");
      } else {
        buscar();
      }
    }

    function verificarEnter(event) {
      if (event.key === "Enter") {
        dispararBusca();
      }
    }

    // NOVA FUNÇÃO: Limpa a pesquisa e volta pro meio da tela
    function fecharPesquisa() {
      const input = document.getElementById("pesquisa");
      const container = document.getElementById("meuContainer");
      const resultado = document.getElementById("resultado");

      input.value = ""; // Apaga o texto digitado
      container.classList.remove("active"); // Tira a classe para descer a tela

      // Espera meio segundo (tempo da animação) para apagar os resultados
      // Isso evita que a caixa encolha de forma feia enquanto desce
      setTimeout(() => {
        resultado.innerHTML = "";
      }, 500);
    }
  </script>

</body>

</html>
